<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sneakers</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        text-align: center;
      }

      h1 {
        margin: 30px 0;
        font-size: 34px;
      }

      .gallery {
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 30px;
        flex-wrap: wrap;
      }

      .card {
        width: 300px; /* bigger card */
        border-radius: 20px;
        overflow: hidden;
        position: relative;
        background: #fff;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-12px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
      }

      .card img {
        width: 100%;
        height: 220px;
        object-fit: contain; /* better look */
        background: #f9f9f9;
        padding: 15px;
      }

      .heart {
        position: absolute;
        top: 12px;
        right: 12px;
        background: white;
        color: #ff4da6;
        padding: 6px 9px;
        border-radius: 50%;
        font-size: 18px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        cursor: pointer;
      }

      /* NEW */
      .badge-new {
        position: absolute;
        top: 12px;
        left: 12px;
        background: green;
        color: white;
        font-size: 12px;
        padding: 5px 12px;
        border-radius: 20px;
        font-weight: bold;
      }

      .card-content {
        padding: 18px;
        text-align: left;
      }

      .brand {
        font-size: 19px;
        font-weight: 600;
      }

      .price {
        color: green;
        font-size: 17px;
        margin: 8px 0 15px;
      }

      /* FULL WIDTH BUTTON */
      .btn-buy {
        width: 100%;
        padding: 12px;
        background: black;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 500;
        transition: 0.3s;
      }
    </style>
  </head>

  <body>
    <h1>🔥 Trending Sneakers Collection</h1>

    <div class="gallery">
      <!-- Card 1 -->
      <div class="card">
        <div class="badge-new">NEW</div>
        <div class="heart">❤</div>
        <img
          src="https://png.pngtree.com/png-clipart/20240901/original/pngtree-sports-shoes-png-image_15910407.png"
        />
        <div class="card-content">
          <div class="brand">Dunk High "Green satin"</div>
          <div class="price">$180.00</div>
          <button class="btn-buy">Buy Now</button>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="card">
        <div class="heart">❤</div>
        <img
          src="https://png.pngtree.com/png-vector/20241018/ourmid/pngtree-running-shoes-or-sneakers-on-a-transparent-background-png-image_14112954.png"
        />
        <div class="card-content">
          <div class="brand">Running Shoes</div>
          <div class="price">$569.00</div>
          <button class="btn-buy">Buy Now</button>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="card">
        <div class="badge-new">NEW</div>
        <div class="heart">❤</div>
        <img
          src="https://png.pngtree.com/png-vector/20240520/ourmid/pngtree-women-s-shoes-sneakers-trainers-in-white-and-orange-png-image_12494915.png"
        />
        <div class="card-content">
          <div class="brand">Air max sport</div>
          <div class="price">$120.00</div>
          <button class="btn-buy">Buy Now</button>
        </div>
      </div>
    </div>
  </body>
</html>
