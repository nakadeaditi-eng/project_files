<!DOCTYPE html>
<html>
<head>
<title>Voter Eligibility Checker</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:100px;
}

input{
    padding:10px;
    width:200px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    background:green;
    color:white;
    border:none;
}

#result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
</style>

</head>
<body>

<h2>Voter Eligibility Checker</h2>

<p>Enter your age:</p>

<input type="number" id="age"><br><br>

<button onclick="check()">Check Eligibility</button>

<p id="result"></p>

<script>
function check()
{
    let age = document.getElementById("age").value;

    document.getElementById("result").innerHTML =
    age >= 18 ? "true" : "false";
}
</script>

</body>
</html>
