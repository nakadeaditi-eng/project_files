<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:25px;
width:300px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#218838;
}

#result{
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="text" id="user" placeholder="Enter Username or Email">

<input type="password" id="pass" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p id="result"></p>

</div>

<script>

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if((user=="admin" || user=="admin@gmail.com") && pass=="1234"){
document.getElementById("result").innerHTML="Login Successful";
document.getElementById("result").style.color="green";
}

else{
document.getElementById("result").innerHTML="Invalid Login";
document.getElementById("result").style.color="red";
}

}

</script>

</body>
</html>
