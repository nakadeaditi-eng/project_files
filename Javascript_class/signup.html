<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

a{
text-decoration:none;
color:blue;
}
</style>

</head>

<body>

<div class="container">

<a href="forgot.html">Forgot Password?</a>

<h2>Sign Up Page</h2>

Name:<br>
<input type="text"><br><br>

Email:<br>
<input type="email"><br><br>

Password:<br>
<input type="password"><br><br>

<button>Register</button><br><br>

<a href="login.html">Back to Login</a>

</div>

</body>
</html>
