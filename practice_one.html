<!DOCTYPE html>
<html>
<head>
    <title>Student Information</title>

    <style>
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: lightcoral;
        }

        input {
            width: 220px;
            padding: 6px;
        }

        button {
            width: 120px;
            height: 40px;
            background-color: lightgreen;
            border: none;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            padding: 20px;
            background-color: #eaf6ea;
            width: 350px;
            display: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Information</h2>

    <input type="text" id="name" placeholder="Enter Name"><br><br>
    <input type="number" id="age" placeholder="Enter Age"><br><br>
    <input type="email" id="email" placeholder="Enter Email"><br><br>
    <input type="text" id="gender" placeholder="Enter Gender"><br><br>
    <input type="text" id="course" placeholder="Enter Course"><br><br>

    <button onclick="showData()">Submit</button>

    <div id="result"></div>
</div>

<script>
function showData() {

    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let email = document.getElementById("email").value;
    let gender = document.getElementById("gender").value;
    let course = document.getElementById("course").value;

    document.getElementById("result").innerHTML =
        "<h3 style='color:blue;'>Submitted Information</h3>" +
        "<p><span style='color:red; font-weight:bold;'>Name:</span> " +
        "<span style='color:green; font-size:18px;'>" + name + "</span></p>" +

        "<p><span style='color:red; font-weight:bold;'>Age:</span> " +
        "<span style='color:green; font-size:18px;'>" + age + "</span></p>" +

        "<p><span style='color:red; font-weight:bold;'>Email:</span> " +
        "<span style='color:green; font-size:18px;'>" + email + "</span></p>" +

        "<p><span style='color:red; font-weight:bold;'>Gender:</span> " +
        "<span style='color:green; font-size:18px;'>" + gender + "</span></p>" +

        "<p><span style='color:red; font-weight:bold;'>Course:</span> " +
        "<span style='color:green; font-size:18px;'>" + course + "</span></p>";

    document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
